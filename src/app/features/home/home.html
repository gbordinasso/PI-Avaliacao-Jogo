<div class="home-container">

  <section class="hero">
    <h1>Jogos Disponíveis</h1>

    <p>
      Encontre seus jogos favoritos, veja avaliações e compartilhe sua opinião com outros jogadores.
    </p>
  </section>

  <div class="search-box">

    <input type="text" placeholder="Buscar jogo..." [(ngModel)]="searchText" (input)="filterGames()" />

    <button (click)="clearFilter()">
      Limpar
    </button>

  </div>

  <div class="loading" *ngIf="loading">Carregando jogos...</div>

  <div class="error" *ngIf="error">
    {{ error }}
  </div>

  <div class="empty" *ngIf="!loading && games.length === 0">
    Nenhum jogo encontrado.
  </div>

  <div class="grid" *ngIf="!loading && games.length > 0">

    <div class="card" *ngFor="let game of games">

      <img [src]="game.background_image || 'https://via.placeholder.com/300'" [alt]="game.name" />

      <div class="card-content">

        <h3>{{ game.name }}</h3>

        <p class="rating">
          ⭐ {{ game.rating || 0 }} / 5
        </p>

        <button [routerLink]="['/game', game.id]">
          Avaliar jogo
        </button>

      </div>

    </div>

  </div>

</div>
