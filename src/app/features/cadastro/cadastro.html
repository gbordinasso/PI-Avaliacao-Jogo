<div class="register-container">

    <h1>Cadastro</h1>

    <input placeholder="Nome" [(ngModel)]="name">
    <input placeholder="Email" [(ngModel)]="email">
    <input type="password" placeholder="Senha" [(ngModel)]="password">
    <input placeholder="CPF" [(ngModel)]="cpf">

    <button (click)="register()">Cadastrar</button>

</div>
