<div class="register-container">

    <h1>Cadastro</h1>

    <input type="text" placeholder="Nome" [(ngModel)]="name">
    <input type="email" placeholder="Email" [(ngModel)]="email">
    <input type="password" placeholder="Senha" [(ngModel)]="password">

    <button (click)="register()">Cadastrar</button>

</div>
